<!DOCTYPE html>
<html lang="en">

<style>
  body {
    background: url(../images/1.jpg) no-repeat top center/cover;
  }
</style>
<script>
  //取到N~M 的随机整数
  function getRandom(N, M) {
    return Math.floor(Math.random() * (M - N + 1)) + N;
  }

  const random = getRandom(1, 3);
  document.body.style.backgroundImage = `url(../images/${random}.jpg)`;
</script>
