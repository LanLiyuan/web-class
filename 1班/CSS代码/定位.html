<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- 相对定位 -->
    <div class="container">
      <button class="btn1">按钮</button>
    </div>
    <!-- 绝对定位 -->
    <div class="box">
      <div class="box2">
        <button class="btn2">按钮2</button>
      </div>
    </div>
  </body>
</html>
<style>
  .container {
    width: 300px;
    height: 300px;
    border: 5px solid red;
    margin-bottom: 20px;
  }
  .btn1 {
    /* 相对定位：相对于它原始自身的位置来移动 */
    position: relative;
    top: 123px;
    left: 116px;
  }
  .box {
    width: 300px;
    height: 300px;
    border: 5px solid blue;
  }
  .box2 {
    position: relative;
    width: 200px;
    height: 200px;
    border: 5px solid red;
  }
  .btn2 {
    position: absolute;
    top: 73px;
    left: 58px;
  }
</style>
